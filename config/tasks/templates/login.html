{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Usuário" class="form-control mb-2">
    <input type="password" name="password" placeholder="Senha" class="form-control mb-2">
    <button class="btn btn-primary">Entrar</button>
</form>

<a href="/register/">Criar conta</a>
{% endblock %}
