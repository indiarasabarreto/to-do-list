{% extends 'base.html' %}

{% block content %}

<h2>Editar Tarefa</h2>

<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" name="titulo" class="form-control" value="{{ tarefa.titulo }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea name="descricao" class="form-control">{{ tarefa.descricao }}</textarea>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" name="concluida" class="form-check-input"
        {% if tarefa.concluida %}checked{% endif %}>
        <label class="form-check-label">Concluída</label>
    </div>

    <button type="submit" class="btn btn-primary">Atualizar</button>
</form>

{% endblock %}
